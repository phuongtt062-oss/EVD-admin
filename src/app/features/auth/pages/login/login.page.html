<div class="login-page">
  <div class="card login-card">
    <div class="login-card__header">
      <h1>Đăng nhập</h1>
      <p class="login-card__subtitle">Quản trị hệ thống tài liệu EVD</p>
    </div>

    @if (error()) {
      <div class="alert alert--error login-card__error">{{ error() }}</div>
    }

    <form class="login-form" (ngSubmit)="onSubmit()">
      <div class="login-form__field">
        <label class="field-label" for="username">Tên đăng nhập</label>
        <input
          id="username"
          class="field-input w-full"
          [(ngModel)]="username"
          name="username"
          autocomplete="username"
          placeholder="Nhập tên đăng nhập"
        />
      </div>

      <div class="login-form__field">
        <label class="field-label" for="password">Mật khẩu</label>
        <div class="login-form__password">
          <input
            id="password"
            class="field-input w-full"
            [type]="showPassword() ? 'text' : 'password'"
            [(ngModel)]="password"
            name="password"
            autocomplete="current-password"
            placeholder="Nhập mật khẩu"
          />
          <button
            type="button"
            class="login-form__toggle"
            (click)="togglePassword()"
            [attr.aria-label]="showPassword() ? 'Ẩn mật khẩu' : 'Hiện mật khẩu'"
          >
            @if (showPassword()) {
              <svg class="login-form__toggle-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M3.27 3.27 2 4.54l2.09 2.09C3.47 7.82 2.17 9.53 1 12c1.73 3.27 5 6 11 6 1.87 0 3.55-.45 5.01-1.17l2.09 2.09 1.27-1.27L3.27 3.27ZM12 16c-2.21 0-4-1.79-4-4 0-.74.2-1.43.55-2.02l5.47 5.47c-.59.35-1.28.55-2.02.55ZM20.82 14.35l-1.74-1.74C19.53 11.82 20.83 10.11 22 8c-1.73-3.27-5-6-11-6-1.5 0-2.87.25-4.1.67l-1.58-1.58C7.2 1.11 9.53 1 12 1c6.63 0 10.27 3.33 12 7-1.01 1.91-2.65 3.52-4.65 4.65l1.47 1.47Z"
                  fill="currentColor"
                />
              </svg>
            } @else {
              <svg class="login-form__toggle-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M12 5c-6.63 0-10.27 3.33-12 7 1.73 3.67 5.37 7 12 7s10.27-3.33 12-7c-1.73-3.67-5.37-7-12-7Zm0 12c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5Zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3Z"
                  fill="currentColor"
                />
              </svg>
            }
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn--block login-form__submit" [disabled]="loading()">
        {{ loading() ? 'Đang đăng nhập...' : 'Đăng nhập' }}
      </button>
    </form>

    <div class="login-demo">
      <p class="login-demo__title">Tài khoản demo - Click vào để chọn tài khoản đăng nhập</p>
      <div class="login-demo__accounts">
        <button type="button" class="login-demo__item" (click)="fillDemo(ROLE_ADMIN)">
          <strong>ADMIN</strong>
          <span>{{ demoUsers[0].username }} / {{ demoUsers[0].password }}</span>
        </button>
        <button type="button" class="login-demo__item" (click)="fillDemo(ROLE_STAFF)">
          <strong>STAFF</strong>
          <span>{{ demoUsers[1].username }} / {{ demoUsers[1].password }}</span>
        </button>
      </div>
    </div>
  </div>
</div>
